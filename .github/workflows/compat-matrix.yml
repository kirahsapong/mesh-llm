name: protocol-compat-matrix

on:
  pull_request:
    paths:
      - 'mesh-llm/src/protocol/**'
      - 'mesh-client/src/protocol/**'
      - 'mesh-llm/tests/protocol_*.rs'
      - 'mesh-client/tests/protocol_*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches:
      - main
      - phase-embedded-sdks

jobs:
  protocol-compat:
    name: Protocol compatibility matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run protocol_compat_v0_client
        run: cargo test -p mesh-llm --test protocol_compat_v0_client
      - name: Run protocol_convert_matrix
        run: cargo test -p mesh-llm --test protocol_convert_matrix
