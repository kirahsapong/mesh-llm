name: embedded-client-purity

on:
  pull_request:
    paths:
      - 'mesh-client-core/**'
      - 'mesh-ffi/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  push:
    branches:
      - main
      - 'feature/native-embedded-sdks'

jobs:
  forbidden-deps:
    name: Forbidden dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Check for forbidden dependencies
        run: |
          cargo tree -p mesh-client-core --prefix=none --no-dedupe > /tmp/deps.txt
          FORBIDDEN="keyring|rpassword|hf-hub|dirs|clap|include_dir|rmcp|keyring-core"
          if grep -wE "^($FORBIDDEN)" /tmp/deps.txt; then
            echo "ERROR: Forbidden dependency found in mesh-client-core"
            grep -wE "^($FORBIDDEN)" /tmp/deps.txt
            exit 1
          fi
          echo "PASS: No forbidden dependencies found"

  ios-sim-check:
    name: iOS Simulator compile check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
      - name: Check iOS Simulator target
        run: cargo check --target aarch64-apple-ios-sim -p mesh-client-core --no-default-features

  android-arm64-check:
    name: Android arm64 compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Check Android arm64 target
        run: cargo ndk -t arm64-v8a check -p mesh-client-core
